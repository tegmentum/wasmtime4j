apiVersion: v1
kind: ServiceAccount
metadata:
  name: wasmtime4j
  labels:
    app: wasmtime4j
    component: security
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/wasmtime4j-pod-role

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wasmtime4j
  labels:
    app: wasmtime4j
    component: security
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wasmtime4j
  labels:
    app: wasmtime4j
    component: security
subjects:
- kind: ServiceAccount
  name: wasmtime4j
  namespace: wasmtime4j-prod
roleRef:
  kind: Role
  name: wasmtime4j
  apiGroup: rbac.authorization.k8s.io