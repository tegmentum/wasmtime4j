apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wasmtime4j-prod

resources:
  - ../base
  - namespace.yaml
  - pdb.yaml
  - rbac.yaml
  - secrets.yaml

patchesStrategicMerge:
  - deployment-patch.yaml
  - service-patch.yaml
  - hpa-patch.yaml

configMapGenerator:
  - name: wasmtime4j-config
    behavior: merge
    literals:
      - log.level=INFO
      - cache.size=1GB
      - wasmtime.instance.pooling.max.instances=2000
      - jvm.heap.max=3G
      - performance.optimization.level=speed
      - security.sandbox.enabled=true

secretGenerator:
  - name: wasmtime4j-secrets
    literals:
      - database.password=REPLACE_ME
      - api.key=REPLACE_ME
      - monitoring.token=REPLACE_ME

images:
  - name: wasmtime4j
    newName: wasmtime4j
    newTag: v1.0.0

replicas:
  - name: wasmtime4j
    count: 5

commonLabels:
  environment: production
  tier: backend

commonAnnotations:
  deployment.kubernetes.io/revision: "1"
  config.kubernetes.io/origin: "kustomize"