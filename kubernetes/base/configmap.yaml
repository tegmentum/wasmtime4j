apiVersion: v1
kind: ConfigMap
metadata:
  name: wasmtime4j-config
  labels:
    app: wasmtime4j
    component: configuration
data:
  # Application configuration
  log.level: "INFO"
  cache.size: "512MB"
  metrics.enabled: "true"
  health.check.enabled: "true"

  # WebAssembly runtime configuration
  wasmtime.compilation.strategy: "cranelift"
  wasmtime.memory.max.size: "2GB"
  wasmtime.instance.pooling.enabled: "true"
  wasmtime.instance.pooling.max.instances: "1000"

  # JVM configuration template
  jvm.heap.initial: "512m"
  jvm.heap.max: "1536m"
  jvm.gc.algorithm: "G1GC"
  jvm.gc.concurrent.threads: "4"

  # Security configuration
  security.sandbox.enabled: "true"
  security.capability.filesystem: "restricted"
  security.capability.network: "restricted"
  security.capability.clock: "restricted"

  # Performance configuration
  performance.profiling.enabled: "false"
  performance.metrics.collection.interval: "30s"
  performance.optimization.level: "speed"

  # Logging configuration
  logging.format: "json"
  logging.output: "stdout"
  logging.file.rotation: "daily"
  logging.file.retention: "7d"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wasmtime4j-monitoring
  labels:
    app: wasmtime4j
    component: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - "wasmtime4j.rules"

    scrape_configs:
      - job_name: 'wasmtime4j'
        static_configs:
          - targets: ['wasmtime4j-metrics:9090']
        metrics_path: /metrics
        scrape_interval: 15s
        scrape_timeout: 10s

      - job_name: 'wasmtime4j-jvm'
        static_configs:
          - targets: ['wasmtime4j-metrics:9090']
        metrics_path: /metrics/jvm
        scrape_interval: 30s

      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

  wasmtime4j.rules: |
    groups:
      - name: wasmtime4j.rules
        rules:
          - alert: Wasmtime4jHighErrorRate
            expr: rate(wasmtime4j_errors_total[5m]) > 0.1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High error rate in Wasmtime4j"
              description: "Wasmtime4j error rate is {{ $value }} errors per second"

          - alert: Wasmtime4jHighMemoryUsage
            expr: wasmtime4j_memory_used_bytes / wasmtime4j_memory_max_bytes > 0.8
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage in Wasmtime4j"
              description: "Wasmtime4j memory usage is {{ $value }}%"

          - alert: Wasmtime4jCompilationLatencyHigh
            expr: histogram_quantile(0.95, rate(wasmtime4j_compilation_duration_seconds_bucket[5m])) > 1.0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High WebAssembly compilation latency"
              description: "95th percentile compilation latency is {{ $value }}s"