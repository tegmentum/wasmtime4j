apiVersion: v1
kind: Service
metadata:
  name: wasmtime4j
  labels:
    app: wasmtime4j
    component: runtime
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: https
    port: 443
    targetPort: 8443
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: wasmtime4j
    component: runtime
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: wasmtime4j-headless
  labels:
    app: wasmtime4j
    component: runtime
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: wasmtime4j
    component: runtime

---
apiVersion: v1
kind: Service
metadata:
  name: wasmtime4j-metrics
  labels:
    app: wasmtime4j
    component: runtime
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: wasmtime4j
    component: runtime