apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wasmtime4j
  labels:
    app: wasmtime4j
    component: ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - wasmtime4j.example.com
    - api.wasmtime4j.example.com
    secretName: wasmtime4j-tls
  rules:
  - host: wasmtime4j.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wasmtime4j
            port:
              number: 80
      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: wasmtime4j-metrics
            port:
              number: 9090
  - host: api.wasmtime4j.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: wasmtime4j
            port:
              number: 80

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wasmtime4j-network-policy
  labels:
    app: wasmtime4j
spec:
  podSelector:
    matchLabels:
      app: wasmtime4j
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - namespaceSelector:
        matchLabels:
          name: monitoring
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9090
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80