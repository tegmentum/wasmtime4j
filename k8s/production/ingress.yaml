apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wasmtime4j-ingress
  namespace: wasmtime4j
  labels:
    app: wasmtime4j-app
    component: ingress
  annotations:
    # NGINX Ingress Controller annotations
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"

    # Rate limiting
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"

    # Connection settings
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Content-Type-Options nosniff;
      add_header X-Frame-Options DENY;
      add_header X-XSS-Protection "1; mode=block";
      add_header Referrer-Policy "strict-origin-when-cross-origin";
      add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';";

    # Health checks
    nginx.ingress.kubernetes.io/upstream-health-check: "true"
    nginx.ingress.kubernetes.io/upstream-health-check-path: "/health"
    nginx.ingress.kubernetes.io/upstream-health-check-interval: "30s"
    nginx.ingress.kubernetes.io/upstream-health-check-timeout: "10s"

    # Load balancing
    nginx.ingress.kubernetes.io/load-balance: "ewma"
    nginx.ingress.kubernetes.io/upstream-keepalive-requests: "1000"
    nginx.ingress.kubernetes.io/upstream-keepalive-timeout: "60"

    # Monitoring
    nginx.ingress.kubernetes.io/enable-access-log: "true"
    nginx.ingress.kubernetes.io/enable-rewrite-log: "false"

spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - wasmtime4j.example.com
    - api.wasmtime4j.example.com
    secretName: wasmtime4j-tls-cert
  rules:
  - host: wasmtime4j.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wasmtime4j-service
            port:
              number: 8080
      - path: /health
        pathType: Exact
        backend:
          service:
            name: wasmtime4j-service
            port:
              number: 8080
      - path: /ready
        pathType: Exact
        backend:
          service:
            name: wasmtime4j-service
            port:
              number: 8080
      - path: /metrics
        pathType: Exact
        backend:
          service:
            name: wasmtime4j-service
            port:
              number: 8080
  - host: api.wasmtime4j.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: wasmtime4j-service
            port:
              number: 8080

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wasmtime4j-network-policy
  namespace: wasmtime4j
  labels:
    app: wasmtime4j-app
    component: security
spec:
  podSelector:
    matchLabels:
      app: wasmtime4j-app
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - namespaceSelector:
        matchLabels:
          name: monitoring
    - podSelector:
        matchLabels:
          app: wasmtime4j-app
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9999
    - protocol: TCP
      port: 9100
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: TCP
      port: 443
  - to:
    - podSelector:
        matchLabels:
          app: wasmtime4j-app
    ports:
    - protocol: TCP
      port: 8080