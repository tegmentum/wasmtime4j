apiVersion: v1
kind: Service
metadata:
  name: wasmtime4j-service
  namespace: wasmtime4j
  labels:
    app: wasmtime4j-app
    component: application
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: wasmtime4j-app
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: jmx
    port: 9999
    targetPort: 9999
    protocol: TCP
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: wasmtime4j-headless
  namespace: wasmtime4j
  labels:
    app: wasmtime4j-app
    component: application
    service-type: headless
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: wasmtime4j-app
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: jmx
    port: 9999
    targetPort: 9999
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: wasmtime4j-metrics
  namespace: wasmtime4j
  labels:
    app: wasmtime4j-app
    component: metrics
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9100"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: wasmtime4j-app
  ports:
  - name: node-metrics
    port: 9100
    targetPort: 9100
    protocol: TCP