[package]
name = "wasmtime4j-native"
version = "1.0.0"
edition = "2021"
description = "Native Rust library providing unified Wasmtime bindings for both JNI and Panama FFI"
license = "Apache-2.0"
repository = "https://github.com/tegmentum/wasmtime4j"
readme = "README.md"

# Optimize for native library use
[lib]
name = "wasmtime4j"
crate-type = ["cdylib", "staticlib"]

[dependencies]
# Wasmtime WebAssembly runtime
wasmtime = "36.0.2"
wasmtime-wasi = { version = "36.0.2", optional = true }

# JNI support for Java 8-22 compatibility
jni = { version = "0.21.1", optional = true }

# Async runtime for WASI and other async operations
tokio = { version = "1.35", features = ["full"] }

# Serialization support for complex data structures
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
log = "0.4"
env_logger = "0.10"

# Memory management utilities
once_cell = "1.19"

[build-dependencies]
# Build script dependencies for cross-compilation
cc = "1.0"
pkg-config = "0.3"

[features]
default = ["jni-bindings", "panama-ffi"]

# JNI bindings for Java 8-22
jni-bindings = ["jni"]

# Panama Foreign Function Interface for Java 23+
panama-ffi = []

# WASI support (using wasmtime-wasi crate)
wasi = ["wasmtime-wasi"]

# Component model support
component-model = ["wasmtime/component-model"]

# Async support
async = ["wasmtime/async"]

# Profiling support  
profiling = ["wasmtime/profiling"]

# Note: Memory64 support not available in Wasmtime 36.0.2

[profile.release]
# Optimize for size and speed in release builds
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

[profile.dev]
# Fast compilation for development
opt-level = 0
debug = true

# Platform-specific configurations
[target.'cfg(target_os = "linux")'.dependencies]
# Linux-specific dependencies if needed

[target.'cfg(target_os = "macos")'.dependencies]
# macOS-specific dependencies if needed

[target.'cfg(target_os = "windows")'.dependencies]
# Windows-specific dependencies if needed

# Cross-compilation targets
[[bin]]
name = "build-info"
path = "src/bin/build-info.rs"
required-features = []