[package]
name = "wasmtime4j-native"
version = "41.0.1-1.0.0"
edition = "2021"
description = "Native Rust library providing unified Wasmtime bindings for both JNI and Panama FFI"
license = "Apache-2.0"
repository = "https://github.com/tegmentum/wasmtime4j"
readme = "README.md"

# Optimize for native library use
[lib]
name = "wasmtime4j"
crate-type = ["cdylib", "staticlib", "rlib"]

[dependencies]
# Wasmtime WebAssembly runtime
wasmtime = { version = "41.0.1", features = ["component-model", "component-model-async", "async", "coredump", "gc"] }
wasmtime-wasi = { version = "41.0.1", optional = true }
wasmtime-wasi-http = { version = "41.0.1", optional = true }
wasmtime-wasi-nn = { version = "41.0.1", optional = true }
wasmtime-wasi-threads = { version = "41.0.1", optional = true }
wasmtime-wasi-keyvalue = { version = "41.0.1", optional = true }
wasmtime-wasi-config = { version = "41.0.1", optional = true }
wasi-common = { version = "41.0.1", optional = true }
wasmtime-wast = { version = "41.0.1", features = ["component-model", "component-model-async"] }

# WebAssembly text format parser
wat = "1.0"
wast = "243.0.0"
wasmparser = "0.243"

# JNI support for Java 8-22 compatibility
jni = { version = "0.21.1", optional = true }

# Async runtime for WASI and other async operations
tokio = { version = "1.35", features = ["full"] }
futures = "0.3"

# Serialization support for complex data structures
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Date/time and unique identifiers
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.6", features = ["v4", "serde"] }

# File system operations
filetime = "0.2"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
log = "0.4"
env_logger = "0.10"

# Memory management utilities
once_cell = "1.19"
lazy_static = "1.4"

# Thread pools and parallel execution
num_cpus = "1.16"

# Cross-thread communication
crossbeam = "0.8"

# Advanced threading and lock-free data structures
parking_lot = "0.12"

# Encoding and compression
base64 = "0.22"
flate2 = "1.0"
sha2 = "0.10"
rand = "0.8"

# Unix-specific dependencies for process operations
[target.'cfg(unix)'.dependencies]
libc = "0.2"

# Windows-specific dependencies for advanced memory management
[target.'cfg(windows)'.dependencies]
winapi = { version = "0.3", features = ["sysinfoapi", "memoryapi", "processenv", "winnt", "handleapi"] }

[build-dependencies]
# Build script dependencies for cross-compilation
cc = "1.0"
pkg-config = "0.3"

[dev-dependencies]
# Testing dependencies
tempfile = "3.8"

[features]
default = ["jni-bindings", "panama-ffi", "component-model", "wasi", "wasi-http", "wasi-keyvalue", "wasi-threads"]

# JNI bindings for Java 8-22
jni-bindings = ["jni"]

# Panama Foreign Function Interface for Java 23+
panama-ffi = []

# WASI support (using wasmtime-wasi crate)
wasi = ["wasmtime-wasi"]

# WASI HTTP support (using wasmtime-wasi-http crate)
wasi-http = ["wasmtime-wasi-http", "wasi"]

# WASI-NN support (neural network inference - Tier 3 experimental)
wasi-nn = ["wasmtime-wasi-nn", "wasi"]

# WASI-Threads support (thread spawning - experimental)
wasi-threads = ["wasmtime-wasi-threads", "wasi-common", "wasi"]

# WASI-KeyValue support (key-value store - requires wasmtime 39+)
wasi-keyvalue = ["wasmtime-wasi-keyvalue", "wasi"]

# WASI-Config support (configuration variables - requires wasmtime 39+)
wasi-config = ["wasmtime-wasi-config", "wasi"]

# Component model support (WASI2)
component-model = [
    "wasmtime/component-model",
    "wasmtime/component-model-async"
]

# Async support
async = ["wasmtime/async"]

# Profiling support
profiling = ["wasmtime/profiling"]

# WebAssembly memory checker (wmemcheck) for debugging
# Enables runtime detection of memory errors in wasm programs
# Note: This adds overhead and is primarily for debugging
wmemcheck = ["wasmtime/wmemcheck"]

[profile.release]
# Optimize for size and speed in release builds
opt-level = 3
lto = true
codegen-units = 1
panic = "unwind"  # Required for catch_unwind to work in JNI

[profile.dev]
# Fast compilation for development
opt-level = 0
debug = true

# Platform-specific configurations
[target.'cfg(target_os = "linux")'.dependencies]
# Linux-specific dependencies if needed

[target.'cfg(target_os = "macos")'.dependencies]
# macOS-specific dependencies if needed

[target.'cfg(target_os = "windows")'.dependencies]
# Windows-specific dependencies if needed

# Cross-compilation targets
[[bin]]
name = "build-info"
path = "src/bin/build-info.rs"
required-features = []

# Patch wasmtime to use our fork with idempotent GLOBAL_CODE registry fix
# This prevents SIGABRT crashes in long-running JVM processes due to
# virtual address reuse before Arc references are fully released.
# See: https://github.com/tegmentum/wasmtime/tree/fix/global-code-registry-idempotent-v41
[patch.crates-io]
wasmtime = { git = "https://github.com/tegmentum/wasmtime.git", branch = "fix/global-code-registry-idempotent-v41" }
wasmtime-wasi = { git = "https://github.com/tegmentum/wasmtime.git", branch = "fix/global-code-registry-idempotent-v41" }
wasmtime-wasi-http = { git = "https://github.com/tegmentum/wasmtime.git", branch = "fix/global-code-registry-idempotent-v41" }
wasmtime-wasi-nn = { git = "https://github.com/tegmentum/wasmtime.git", branch = "fix/global-code-registry-idempotent-v41" }
wasmtime-wasi-threads = { git = "https://github.com/tegmentum/wasmtime.git", branch = "fix/global-code-registry-idempotent-v41" }
wasmtime-wasi-keyvalue = { git = "https://github.com/tegmentum/wasmtime.git", branch = "fix/global-code-registry-idempotent-v41" }
wasmtime-wasi-config = { git = "https://github.com/tegmentum/wasmtime.git", branch = "fix/global-code-registry-idempotent-v41" }
wasi-common = { git = "https://github.com/tegmentum/wasmtime.git", branch = "fix/global-code-registry-idempotent-v41" }
wasmtime-wast = { git = "https://github.com/tegmentum/wasmtime.git", branch = "fix/global-code-registry-idempotent-v41" }