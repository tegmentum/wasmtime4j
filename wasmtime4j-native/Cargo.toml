[package]
name = "wasmtime4j-native"
version = "1.0.0"
edition = "2021"
description = "Native Rust library providing unified Wasmtime bindings for both JNI and Panama FFI"
license = "Apache-2.0"
repository = "https://github.com/tegmentum/wasmtime4j"
readme = "README.md"

# Optimize for native library use
[lib]
name = "wasmtime4j"
crate-type = ["cdylib", "staticlib"]

[dependencies]
# Wasmtime WebAssembly runtime
wasmtime = { version = "37.0.2", features = ["component-model", "component-model-async", "async", "gc"] }
wasmtime-wasi = { version = "37.0.2", optional = true }
wasmtime-wast = { version = "37.0.2", features = ["component-model", "component-model-async"] }

# WebAssembly text format parser
wat = "1.0"
wast = "240.0.0"

# JNI support for Java 8-22 compatibility
jni = { version = "0.21.1", optional = true }

# Async runtime for WASI and other async operations
tokio = { version = "1.35", features = ["full"] }
futures = "0.3"

# Serialization support for complex data structures
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
log = "0.4"
env_logger = "0.10"

# Memory management utilities
once_cell = "1.19"
lazy_static = "1.4"

# Thread pools and parallel execution
rayon = "1.8"
num_cpus = "1.16"

# Cross-thread communication
crossbeam = "0.8"

# Advanced threading and lock-free data structures
parking_lot = "0.12"
petgraph = "0.6"
crossbeam-deque = "0.8"
crossbeam-utils = "0.8"

# Cryptographic and enterprise feature dependencies
ring = "0.17"
base64 = "0.22"
hex = "0.4"
uuid = { version = "1.6", features = ["v4", "serde"] }
flate2 = "1.0"
sha2 = "0.10"
rand = "0.8"
chrono = { version = "0.4", features = ["serde"] }

# Advanced networking protocol dependencies
tokio-tungstenite = { version = "0.21", features = ["native-tls"], optional = true }
tungstenite = { version = "0.21", optional = true }
h2 = { version = "0.4", optional = true }
hyper = { version = "1.1", features = ["full"], optional = true }
hyper-util = { version = "0.1", features = ["full"], optional = true }
http-body-util = { version = "0.1", optional = true }
http = { version = "1.0", optional = true }
tower = { version = "0.4", optional = true }
tower-service = { version = "0.3", optional = true }

# File system operations and timestamp handling
filetime = "0.2"

# TLS and security
tokio-native-tls = { version = "0.3", optional = true }
native-tls = { version = "0.2", optional = true }
rustls = { version = "0.22", default-features = false, features = ["ring"], optional = true }
tokio-rustls = { version = "0.25", optional = true }
webpki-roots = { version = "0.26", optional = true }

# gRPC and Protocol Buffers
tonic = { version = "0.10", features = ["tls", "tls-roots"], optional = true }
prost = { version = "0.12", optional = true }
prost-types = { version = "0.12", optional = true }

# Connection pooling and management
bb8 = { version = "0.8", optional = true }
tower-http = { version = "0.5", features = ["full"], optional = true }

# Protocol negotiation and multiplexing
# alpn = "0.1" # Not available on crates.io

# Unix-specific dependencies for process operations
[target.'cfg(unix)'.dependencies]
libc = "0.2"

# Windows-specific dependencies for advanced memory management
[target.'cfg(windows)'.dependencies]
winapi = { version = "0.3", features = ["sysinfoapi", "memoryapi", "processenv", "winnt", "handleapi"] }

[build-dependencies]
# Build script dependencies for cross-compilation
cc = "1.0"
pkg-config = "0.3"
# Protocol buffer compilation
prost-build = "0.12"
tonic-build = "0.10"

[dev-dependencies]
# Testing dependencies
tempfile = "3.8"

[features]
default = ["jni-bindings", "panama-ffi", "component-model", "wasi", "advanced-networking"]

# JNI bindings for Java 8-22
jni-bindings = ["jni"]

# Panama Foreign Function Interface for Java 23+
panama-ffi = []

# WASI support (using wasmtime-wasi crate)
wasi = ["wasmtime-wasi"]

# Component model support (WASI2)
component-model = [
    "wasmtime/component-model",
    "wasmtime/component-model-async"
]

# Async support
async = ["wasmtime/async"]

# Profiling support
profiling = ["wasmtime/profiling"]

# Advanced networking protocols
advanced-networking = ["tokio-tungstenite", "h2", "tonic", "hyper", "http", "prost", "tokio-rustls", "rustls", "webpki-roots"]

# WebSocket support
websocket = ["tokio-tungstenite"]

# HTTP/2 support
http2 = ["h2", "hyper"]

# gRPC support
grpc = ["tonic", "prost"]

# TLS support
tls = ["tokio-rustls", "rustls", "webpki-roots"]

# Connection pooling
connection-pooling = ["bb8", "tower-http"]

# Note: Memory64 support not available in Wasmtime 36.0.2

[profile.release]
# Optimize for size and speed in release builds
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

[profile.dev]
# Fast compilation for development
opt-level = 0
debug = true

# Platform-specific configurations
[target.'cfg(target_os = "linux")'.dependencies]
# Linux-specific dependencies if needed

[target.'cfg(target_os = "macos")'.dependencies]
# macOS-specific dependencies if needed

[target.'cfg(target_os = "windows")'.dependencies]
# Windows-specific dependencies if needed

# Cross-compilation targets
[[bin]]
name = "build-info"
path = "src/bin/build-info.rs"
required-features = []