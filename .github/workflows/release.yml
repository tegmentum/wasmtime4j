name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Build native libraries on each platform
  build-native:
    name: Native (${{ matrix.platform }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
            lib: libwasmtime4j.so
            container: almalinux:8
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            target: aarch64-unknown-linux-gnu
            lib: libwasmtime4j.so
            container: almalinux:8
          - os: macos-latest
            platform: darwin-aarch64
            target: aarch64-apple-darwin
            lib: libwasmtime4j.dylib
          - os: windows-latest
            platform: windows-x86_64
            target: x86_64-pc-windows-msvc
            lib: wasmtime4j.dll
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}
    steps:
      - name: Install build prerequisites
        if: matrix.container
        run: dnf install -y gcc gcc-c++ make curl git perl-core

      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wasmtime4j-native/.cargo-target
          key: cargo-${{ matrix.platform }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: cargo-${{ matrix.platform }}-

      - name: Build native library
        shell: bash
        env:
          CARGO_TARGET_DIR: wasmtime4j-native/.cargo-target
        run: cargo build --release --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.platform }}
          path: wasmtime4j-native/.cargo-target/${{ matrix.target }}/release/${{ matrix.lib }}
          retention-days: 90
          if-no-files-found: error

  # Build wasi-nn-featured native libraries. Parallel to build-native; a
  # separate job (rather than a matrix axis on build-native) so failures on
  # this experimental path don't cascade into the plain build. Windows is
  # deliberately omitted — the ort crate's windows-x86_64 story with
  # ORT_STRATEGY=system is fragile and there's no cheap parity path; a
  # wasi-nn Windows JAR can land in a follow-up.
  build-native-wasi-nn:
    name: Native wasi-nn (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
            lib: libwasmtime4j.so
            container: almalinux:8
            ort_url: https://github.com/microsoft/onnxruntime/releases/download/v1.20.1/onnxruntime-linux-x64-1.20.1.tgz
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            target: aarch64-unknown-linux-gnu
            lib: libwasmtime4j.so
            container: almalinux:8
            ort_url: https://github.com/microsoft/onnxruntime/releases/download/v1.20.1/onnxruntime-linux-aarch64-1.20.1.tgz
          - os: macos-latest
            platform: darwin-aarch64
            target: aarch64-apple-darwin
            lib: libwasmtime4j.dylib
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}
    steps:
      - name: Install build prerequisites
        if: matrix.container
        run: dnf install -y gcc gcc-c++ make curl git perl-core tar gzip which openssl-devel pkgconfig

      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install ONNX Runtime (macOS via Homebrew)
        if: runner.os == 'macOS'
        run: |
          brew install onnxruntime
          # brew formula installs libs to /opt/homebrew/lib and headers to
          # /opt/homebrew/include/onnxruntime. ort's system strategy expects
          # ORT_LIB_LOCATION to name the prefix directory.
          echo "ORT_LIB_LOCATION=/opt/homebrew" >> "$GITHUB_ENV"

      - name: Install ONNX Runtime (Linux prebuilt from Microsoft)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p "$HOME/ort"
          curl -fsSL "${{ matrix.ort_url }}" -o /tmp/ort.tgz
          tar -xzf /tmp/ort.tgz -C "$HOME/ort" --strip-components=1
          # Prebuilt tarball layout: include/, lib/. ORT_LIB_LOCATION points
          # at the prefix; ort finds lib/libonnxruntime.so beneath it.
          echo "ORT_LIB_LOCATION=$HOME/ort" >> "$GITHUB_ENV"

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wasmtime4j-native/.cargo-target
          key: cargo-wasi-nn-${{ matrix.platform }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: cargo-wasi-nn-${{ matrix.platform }}-

      - name: Build wasi-nn native library
        shell: bash
        env:
          CARGO_TARGET_DIR: wasmtime4j-native/.cargo-target
          ORT_STRATEGY: system
          ORT_PREFER_DYNAMIC_LINK: '1'
        run: |
          cargo build --release \
            --manifest-path wasmtime4j-native/Cargo.toml \
            --features wasi-nn \
            --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v7
        with:
          name: native-wasi-nn-${{ matrix.platform }}
          path: wasmtime4j-native/.cargo-target/${{ matrix.target }}/release/${{ matrix.lib }}
          retention-days: 90
          if-no-files-found: error

  # Test on each platform with JNI (Java 8) and Panama (Java 23)
  test:
    name: Test Java ${{ matrix.java }} (${{ matrix.platform }})
    needs: build-native
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            java: '8'
          - os: ubuntu-latest
            platform: linux-x86_64
            java: '23'
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            java: '8'
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            java: '23'
          - os: macos-latest
            platform: darwin-aarch64
            java: '8'
          - os: macos-latest
            platform: darwin-aarch64
            java: '23'
          - os: windows-latest
            platform: windows-x86_64
            java: '8'
          - os: windows-latest
            platform: windows-x86_64
            java: '23'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          # Java 8 target: use JDK 21 to compile with source/target 8 and run tests
          java-version: ${{ matrix.java == '8' && '21' || matrix.java }}
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: m2-test-${{ matrix.java }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: m2-test-

      - name: Download native library
        uses: actions/download-artifact@v8
        with:
          name: native-${{ matrix.platform }}
          path: wasmtime4j-native/src/main/resources/natives/${{ matrix.platform }}/

      - name: Install and test
        shell: bash
        run: |
          COMMON_ARGS="-B -P skip-native -q -DskipQuality -Dmaven.javadoc.skip=true -Dgpg.skip=true -Dcheckstyle.skip=true -Dspotless.check.skip=true"
          ./mvnw install $COMMON_ARGS -Dmaven.test.skip=true -pl '!:wasmtime4j-tests-stress'
          ./mvnw test $COMMON_ARGS -pl wasmtime4j-tests/wasmtime

  # Static analysis (runs in parallel with tests)
  quality:
    name: Code Quality
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: m2-quality-${{ hashFiles('**/pom.xml') }}
          restore-keys: m2-quality-

      - name: Checkstyle
        run: ./mvnw checkstyle:check -B -P skip-native -pl wasmtime4j,wasmtime4j-jni,wasmtime4j-native-loader

      - name: Spotless
        run: ./mvnw spotless:check -B -P skip-native -pl wasmtime4j,wasmtime4j-jni,wasmtime4j-panama,wasmtime4j-native-loader

      - name: Install dependencies
        run: |
          ./mvnw install -B -N -q -DskipTests -DskipQuality -Dmaven.javadoc.skip=true -Dgpg.skip=true
          ./mvnw install -B -P skip-native -pl wasmtime4j-native-loader -q -DskipTests -DskipQuality -Dmaven.javadoc.skip=true -Dgpg.skip=true

      - name: SpotBugs
        run: ./mvnw compile spotbugs:check -B -P skip-native -pl wasmtime4j

      - name: PMD
        run: ./mvnw compile pmd:check -B -P skip-native -pl wasmtime4j

  # Publish — requires manual approval via GitHub environment
  publish:
    name: Publish
    needs: [test, quality]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v7

      # JDK 23 (>= 22) so the panama-available profile activates and
      # wasmtime4j-panama actually compiles; JDK 21 activated panama-
      # unavailable and shipped an empty jar to Maven Central (#339).
      - uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Cache Maven
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: m2-publish-${{ hashFiles('**/pom.xml') }}
          restore-keys: m2-publish-

      # Download all 4 native libraries into resource directories
      - name: Download native libraries
        uses: actions/download-artifact@v8
        with:
          name: native-linux-x86_64
          path: wasmtime4j-native/src/main/resources/natives/linux-x86_64/
      - uses: actions/download-artifact@v8
        with:
          name: native-linux-aarch64
          path: wasmtime4j-native/src/main/resources/natives/linux-aarch64/
      - uses: actions/download-artifact@v8
        with:
          name: native-darwin-aarch64
          path: wasmtime4j-native/src/main/resources/natives/darwin-aarch64/
      - uses: actions/download-artifact@v8
        with:
          name: native-windows-x86_64
          path: wasmtime4j-native/src/main/resources/natives/windows-x86_64/

      - name: Verify native libraries
        run: |
          echo "Native library layout:"
          find wasmtime4j-native/src/main/resources/natives/ -type f
          test -f wasmtime4j-native/src/main/resources/natives/linux-x86_64/libwasmtime4j.so
          test -f wasmtime4j-native/src/main/resources/natives/linux-aarch64/libwasmtime4j.so
          test -f wasmtime4j-native/src/main/resources/natives/darwin-aarch64/libwasmtime4j.dylib
          test -f wasmtime4j-native/src/main/resources/natives/windows-x86_64/wasmtime4j.dll

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          DEPLOY_MODULES="-pl wasmtime4j,wasmtime4j-native,wasmtime4j-native-loader,wasmtime4j-jni,wasmtime4j-panama"
          ./mvnw deploy -B -P release,skip-native \
            -DskipTests -DskipQuality -Dmaven.test.skip=true \
            -Drevision=${{ steps.version.outputs.version }} \
            $DEPLOY_MODULES

      - name: Deploy to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEPLOY_MODULES="-pl wasmtime4j,wasmtime4j-native,wasmtime4j-native-loader,wasmtime4j-jni,wasmtime4j-panama"
          mkdir -p ~/.m2
          cat > ~/.m2/settings-github.xml <<'SETTINGS'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          SETTINGS
          ./mvnw deploy -B -P skip-native \
            -DskipTests -DskipQuality -Dmaven.test.skip=true \
            -Drevision=${{ steps.version.outputs.version }} \
            -DaltDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }} \
            -Dgpg.skip=true \
            -s ~/.m2/settings-github.xml \
            $DEPLOY_MODULES

      - name: Package release artifacts
        run: |
          DEPLOY_MODULES="-pl wasmtime4j,wasmtime4j-native,wasmtime4j-native-loader,wasmtime4j-jni,wasmtime4j-panama"
          ./mvnw package -B -P release,skip-native \
            -DskipTests -DskipQuality -Dmaven.test.skip=true \
            -Drevision=${{ steps.version.outputs.version }} \
            $DEPLOY_MODULES

      - name: Create checksums
        run: |
          for dir in wasmtime4j/target wasmtime4j-native/target wasmtime4j-jni/target wasmtime4j-panama/target wasmtime4j-native-loader/target; do
            if [ -d "$dir" ]; then
              for jar in "$dir"/*.jar; do
                [ -f "$jar" ] && sha256sum "$jar" > "$jar.sha256"
              done
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            wasmtime4j/target/*.jar
            wasmtime4j/target/*.jar.sha256
            wasmtime4j-native/target/*.jar
            wasmtime4j-native/target/*.jar.sha256
            wasmtime4j-jni/target/*.jar
            wasmtime4j-jni/target/*.jar.sha256
            wasmtime4j-panama/target/*.jar
            wasmtime4j-panama/target/*.jar.sha256
            wasmtime4j-native-loader/target/*.jar
            wasmtime4j-native-loader/target/*.jar.sha256

  # Publish the wasi-nn classifier variant. Runs after the plain publish
  # so the release exists to append to; independent success/failure so a
  # broken wasi-nn build does not block or roll back the plain release.
  # See CHANGELOG 46.0.1-1.4.1 (Packaging) for the consumer story.
  publish-wasi-nn:
    name: Publish (wasi-nn classifier)
    needs: [publish, build-native-wasi-nn]
    if: always() && needs.publish.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Cache Maven
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: m2-publish-wasi-nn-${{ hashFiles('**/pom.xml') }}
          restore-keys: m2-publish-wasi-nn-

      # Overlay wasi-nn-linked natives into the same resource layout the
      # non-wasi-nn publish job used. -P wasi-nn only changes classifiers +
      # cargo.features; with -P skip-native the cargo step is bypassed so
      # the classifier JARs pick up exactly the binaries staged here.
      - name: Download wasi-nn native libraries
        uses: actions/download-artifact@v8
        with:
          name: native-wasi-nn-linux-x86_64
          path: wasmtime4j-native/src/main/resources/natives/linux-x86_64/
      - uses: actions/download-artifact@v8
        with:
          name: native-wasi-nn-linux-aarch64
          path: wasmtime4j-native/src/main/resources/natives/linux-aarch64/
      - uses: actions/download-artifact@v8
        with:
          name: native-wasi-nn-darwin-aarch64
          path: wasmtime4j-native/src/main/resources/natives/darwin-aarch64/

      - name: Verify wasi-nn native libraries
        run: |
          echo "wasi-nn native library layout:"
          find wasmtime4j-native/src/main/resources/natives/ -type f
          test -f wasmtime4j-native/src/main/resources/natives/linux-x86_64/libwasmtime4j.so
          test -f wasmtime4j-native/src/main/resources/natives/linux-aarch64/libwasmtime4j.so
          test -f wasmtime4j-native/src/main/resources/natives/darwin-aarch64/libwasmtime4j.dylib

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # -pl wasmtime4j-native only: the wasi-nn profile lives on that
      # module and it's the only artifact that varies by wasi-nn. The
      # wasmtime4j / wasmtime4j-jni / wasmtime4j-panama /
      # wasmtime4j-native-loader poms are unchanged between plain and
      # wasi-nn — publishing them again would collide on Maven Central.
      - name: Deploy wasi-nn classifier to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          ./mvnw deploy -B -P release,skip-native,wasi-nn \
            -pl wasmtime4j-native -am \
            -DskipTests -DskipQuality -Dmaven.test.skip=true \
            -Drevision=${{ steps.version.outputs.version }}

      - name: Deploy wasi-nn classifier to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings-github.xml <<'SETTINGS'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          SETTINGS
          ./mvnw deploy -B -P skip-native,wasi-nn \
            -pl wasmtime4j-native -am \
            -DskipTests -DskipQuality -Dmaven.test.skip=true \
            -Drevision=${{ steps.version.outputs.version }} \
            -DaltDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }} \
            -Dgpg.skip=true \
            -s ~/.m2/settings-github.xml

      - name: Package wasi-nn release artifacts
        run: |
          ./mvnw package -B -P release,skip-native,wasi-nn \
            -pl wasmtime4j-native -am \
            -DskipTests -DskipQuality -Dmaven.test.skip=true \
            -Drevision=${{ steps.version.outputs.version }}

      - name: Create checksums for wasi-nn JARs
        run: |
          for jar in wasmtime4j-native/target/*-wasi-nn*.jar; do
            [ -f "$jar" ] && sha256sum "$jar" > "$jar.sha256"
          done

      - name: Attach wasi-nn artifacts to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # Append to release created by publish job (same tag).
          files: |
            wasmtime4j-native/target/*-wasi-nn*.jar
            wasmtime4j-native/target/*-wasi-nn*.jar.sha256
