name: Documentation

on:
  push:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'docs/**'
      - '**/*.md'
      - 'pom.xml'
      - '**/pom.xml'
  pull_request:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'docs/**'
      - '**/*.md'
      - 'pom.xml'
      - '**/pom.xml'
  workflow_dispatch:

jobs:
  # Generate Javadoc
  javadoc:
    name: Generate Javadoc
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Generate Javadoc
        run: ./mvnw javadoc:aggregate -B

      - name: Upload Javadoc
        uses: actions/upload-artifact@v4
        with:
          name: javadoc
          path: target/site/apidocs/
          retention-days: 30

  # Check documentation quality
  doc-quality:
    name: Documentation Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install documentation tools
        run: |
          npm install -g markdownlint-cli
          pip install doc8

      - name: Lint Markdown files
        run: |
          markdownlint --config .markdownlint.json **/*.md || true

      - name: Check Markdown formatting
        uses: DavidAnson/markdownlint-action@v1
        with:
          files: '**/*.md'
          config: '.markdownlint.json'
          ignore: 'node_modules'

      - name: Check for broken links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'

  # Generate API documentation
  api-docs:
    name: API Documentation
    runs-on: ubuntu-latest
    needs: javadoc
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Download Javadoc
        uses: actions/download-artifact@v4
        with:
          name: javadoc
          path: javadoc/

      - name: Install documentation generator
        run: |
          npm install -g @apidevtools/swagger-jsdoc swagger-ui-express

      - name: Generate API documentation site
        run: |
          mkdir -p docs-site
          cat > docs-site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Wasmtime4j Documentation</title>
              <style>
                  body { font-family: Arial, sans-serif; margin: 40px; }
                  .nav { background: #f5f5f5; padding: 20px; margin-bottom: 20px; }
                  .nav a { margin-right: 20px; text-decoration: none; color: #333; }
                  .nav a:hover { color: #007cba; }
                  .section { margin-bottom: 30px; }
              </style>
          </head>
          <body>
              <div class="nav">
                  <a href="#overview">Overview</a>
                  <a href="#javadoc">API Reference</a>
                  <a href="#performance">Performance</a>
                  <a href="#examples">Examples</a>
              </div>
              
              <h1>Wasmtime4j Documentation</h1>
              
              <div class="section" id="overview">
                  <h2>Overview</h2>
                  <p>Wasmtime4j provides Java bindings for the Wasmtime WebAssembly runtime.</p>
              </div>
              
              <div class="section" id="javadoc">
                  <h2>API Reference</h2>
                  <p><a href="javadoc/index.html">Browse the complete Javadoc API documentation</a></p>
              </div>
          </body>
          </html>
          EOF
          
          # Copy Javadoc to docs site
          cp -r javadoc/ docs-site/javadoc/

      - name: Upload documentation site
        uses: actions/upload-artifact@v4
        with:
          name: documentation-site
          path: docs-site/
          retention-days: 30

  # Deploy documentation (only on master)
  deploy-docs:
    name: Deploy Documentation
    needs: [javadoc, api-docs]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Download documentation site
        uses: actions/download-artifact@v4
        with:
          name: documentation-site
          path: docs-site/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  # Generate performance documentation
  performance-docs:
    name: Performance Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate performance documentation
        run: |
          cd wasmtime4j-benchmarks
          # Run benchmarks with reporting
          ./run-performance-suite.sh --quick --all > performance-overview.md 2>&1 || true
          
          # Generate benchmark documentation
          cat > benchmark-guide.md << 'EOF'
          # Performance Benchmarking Guide
          
          ## Running Benchmarks
          
          The Wasmtime4j project includes comprehensive performance benchmarks:
          
          ```bash
          cd wasmtime4j-benchmarks
          ./run-performance-suite.sh --help
          ```
          
          ## Benchmark Categories
          
          - **Core Performance**: Basic runtime operations
          - **Memory Operations**: Memory allocation and management
          - **Function Execution**: WebAssembly function calls
          - **Module Operations**: Module compilation and instantiation
          
          ## CI/CD Integration
          
          Benchmarks run automatically in CI/CD:
          - Performance regression detection
          - Cross-platform comparison
          - Historical trend analysis
          EOF

      - name: Upload performance docs
        uses: actions/upload-artifact@v4
        with:
          name: performance-docs
          path: |
            wasmtime4j-benchmarks/performance-overview.md
            wasmtime4j-benchmarks/benchmark-guide.md
          retention-days: 30

  # Validate documentation completeness
  doc-completeness:
    name: Documentation Completeness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Check public API documentation
        run: |
          # Find all public classes and methods
          find . -name "*.java" -not -path "*/target/*" -not -path "*/test/*" | xargs grep -l "public class\|public interface" > public_classes.txt
          
          # Check for missing Javadoc
          missing_docs=0
          while read -r file; do
            if ! grep -q "/\*\*" "$file"; then
              echo "Missing Javadoc in: $file"
              missing_docs=$((missing_docs + 1))
            fi
          done < public_classes.txt
          
          echo "Found $missing_docs files with missing documentation"
          
          # Generate documentation completeness report
          cat > doc-completeness-report.md << EOF
          # Documentation Completeness Report
          
          **Date:** $(date -u)
          **Commit:** ${{ github.sha }}
          
          ## Summary
          - Public classes/interfaces: $(wc -l < public_classes.txt)
          - Missing documentation: $missing_docs
          - Completeness: $(echo "scale=2; ($(wc -l < public_classes.txt) - $missing_docs) / $(wc -l < public_classes.txt) * 100" | bc -l)%
          
          ## Files needing documentation
          EOF
          
          while read -r file; do
            if ! grep -q "/\*\*" "$file"; then
              echo "- $file" >> doc-completeness-report.md
            fi
          done < public_classes.txt

      - name: Check README completeness
        run: |
          # Check for essential README sections
          if [ ! -f "README.md" ]; then
            echo "❌ README.md not found"
            exit 1
          fi
          
          sections=("Installation" "Usage" "API" "Examples" "Building" "Testing")
          missing_sections=""
          
          for section in "${sections[@]}"; do
            if ! grep -qi "$section" README.md; then
              missing_sections="$missing_sections\n- $section"
            fi
          done
          
          if [ -n "$missing_sections" ]; then
            echo "⚠️ Missing README sections:$missing_sections"
          else
            echo "✅ README.md appears complete"
          fi

      - name: Upload completeness report
        uses: actions/upload-artifact@v4
        with:
          name: doc-completeness-report
          path: doc-completeness-report.md
          retention-days: 30