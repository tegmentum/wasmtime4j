name: Security Scanning

on:
  schedule:
    # Run weekly security scans
    - cron: '0 8 * * 1'  # Every Monday at 8 AM UTC
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Dependency vulnerability scanning
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run Maven dependency check
        run: |
          ./mvnw org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressOutdatedCheck=true \
            -B

      - name: Run Rust security audit
        run: |
          find . -name "Cargo.toml" -exec dirname {} \; | while read dir; do
            echo "Scanning Rust dependencies in: $dir"
            cd "$dir"
            cargo audit || true
            cd - > /dev/null
          done

      - name: Upload dependency check results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: |
            target/dependency-check-report.html
            **/target/dependency-check-report.html
          retention-days: 30

  # License compliance scanning
  license-scan:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install license-eye
        run: |
          wget -O license-eye https://github.com/apache/skywalking-eyes/releases/latest/download/license-eye-linux-amd64
          chmod +x license-eye

      - name: Check license headers
        run: |
          ./license-eye header check || true

      - name: Generate license report
        run: |
          ./mvnw license:add-third-party -B || true
          ./mvnw license:download-licenses -B || true

      - name: Upload license reports
        uses: actions/upload-artifact@v4
        with:
          name: license-reports
          path: |
            target/generated-sources/license/THIRD-PARTY.txt
            target/licenses/
          retention-days: 30

  # Container security scanning (if using containers)
  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    if: false  # Enable when containerization is added
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t wasmtime4j:test .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'wasmtime4j:test'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # Secret scanning
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD

  # Code security analysis
  code-security:
    name: Code Security Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: java

      - name: Build for CodeQL
        run: ./mvnw clean compile -DskipTests -B

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/java

  # Supply chain security
  supply-chain:
    name: Supply Chain Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Generate SBOM (Software Bill of Materials)
        run: |
          ./mvnw org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom -B
          
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: target/bom.xml
          retention-days: 90

      - name: Verify signatures (if available)
        run: |
          echo "Verifying Maven dependency signatures..."
          # This would verify GPG signatures of dependencies
          # Implementation depends on security requirements

  # Security report generation
  security-report:
    name: Generate Security Report
    needs: [dependency-scan, license-scan, code-security, supply-chain]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate consolidated security report
        run: |
          cat > security-report.md << 'EOF'
          # Security Analysis Report
          
          **Date:** $(date -u)
          **Commit:** ${{ github.sha }}
          **Branch:** ${{ github.ref_name }}
          
          ## Summary
          
          | Component | Status | Details |
          |-----------|--------|---------|
          | Dependency Scan | ${{ needs.dependency-scan.result }} | OWASP Dependency Check |
          | License Compliance | ${{ needs.license-scan.result }} | License validation |
          | Code Security | ${{ needs.code-security.result }} | CodeQL + Semgrep |
          | Supply Chain | ${{ needs.supply-chain.result }} | SBOM generation |
          
          ## Findings
          
          ### Dependencies
          EOF
          
          if [ -f "dependency-check-report/dependency-check-report.html" ]; then
            echo "- Dependency check report available in artifacts" >> security-report.md
          fi
          
          echo "" >> security-report.md
          echo "### License Compliance" >> security-report.md
          if [ -f "license-reports/THIRD-PARTY.txt" ]; then
            echo "- Third-party license report available in artifacts" >> security-report.md
          fi
          
          echo "" >> security-report.md
          echo "### Supply Chain" >> security-report.md
          if [ -f "sbom/bom.xml" ]; then
            echo "- SBOM (Software Bill of Materials) generated" >> security-report.md
          fi

      - name: Create security issue if vulnerabilities found
        if: needs.dependency-scan.result == 'failure' || needs.code-security.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let reportContent = "Security vulnerabilities detected in automated scanning.";
            if (fs.existsSync('security-report.md')) {
              reportContent = fs.readFileSync('security-report.md', 'utf8');
            }
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security Vulnerabilities Detected - ${new Date().toISOString().split('T')[0]}`,
              body: reportContent,
              labels: ['security', 'vulnerability', 'urgent']
            });

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md
          retention-days: 90