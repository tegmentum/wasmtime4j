name: Performance Monitoring

on:
  schedule:
    # Run daily performance tests at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      baseline_ref:
        description: 'Baseline git reference for comparison'
        required: false
        default: 'master'
      skip_baseline:
        description: 'Skip baseline generation and only run current'
        required: false
        default: 'false'
        type: boolean

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Generate performance baseline if needed
  generate-baseline:
    name: Generate Performance Baseline
    if: github.event.inputs.skip_baseline != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            java-version: '8'
          - os: ubuntu-latest
            platform: linux-x86_64
            java-version: '23'
          - os: macos-latest
            platform: macos-x86_64
            java-version: '8'
          - os: macos-latest
            platform: macos-x86_64
            java-version: '23'

    steps:
      - name: Checkout baseline code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.baseline_ref || 'master' }}

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-baseline-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build baseline
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "linux-x86_64" ]]; then
            ./mvnw clean package -P linux-x86_64 -DskipTests -B
          elif [[ "${{ matrix.platform }}" == "macos-x86_64" ]]; then
            ./mvnw clean package -P macos-x86_64 -DskipTests -B
          fi

      - name: Run baseline benchmarks
        shell: bash
        run: |
          cd wasmtime4j-benchmarks
          mkdir -p benchmark-results/baseline
          if [[ "${{ matrix.java-version }}" == "23" ]]; then
            ./run-performance-suite.sh panama 2>&1 | tee benchmark-results/baseline/panama-${{ matrix.platform }}.log
            # Move benchmark results to baseline directory
            cp benchmark-results/*.json benchmark-results/baseline/ 2>/dev/null || true
          else
            ./run-performance-suite.sh jni 2>&1 | tee benchmark-results/baseline/jni-${{ matrix.platform }}.log
            cp benchmark-results/*.json benchmark-results/baseline/ 2>/dev/null || true
          fi

      - name: Upload baseline results
        uses: actions/upload-artifact@v4
        with:
          name: baseline-${{ matrix.platform }}-java${{ matrix.java-version }}
          path: wasmtime4j-benchmarks/benchmark-results/baseline/
          retention-days: 30

  # Run current performance tests
  current-performance:
    name: Current Performance
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            java-version: '8'
          - os: ubuntu-latest
            platform: linux-x86_64
            java-version: '23'
          - os: macos-latest
            platform: macos-x86_64
            java-version: '8'
          - os: macos-latest
            platform: macos-x86_64
            java-version: '23'
          - os: windows-latest
            platform: windows-x86_64
            java-version: '8'

    steps:
      - name: Checkout current code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-current-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install MSVC tools (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build current version
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "linux-x86_64" ]]; then
            ./mvnw clean package -P linux-x86_64 -DskipTests -B
          elif [[ "${{ matrix.platform }}" == "macos-x86_64" ]]; then
            ./mvnw clean package -P macos-x86_64 -DskipTests -B
          elif [[ "${{ matrix.platform }}" == "windows-x86_64" ]]; then
            ./mvnw clean package -P windows-x86_64 -DskipTests -B
          fi

      - name: Run current benchmarks
        shell: bash
        run: |
          cd wasmtime4j-benchmarks
          mkdir -p benchmark-results/current
          if [[ "${{ matrix.java-version }}" == "23" ]]; then
            ./run-performance-suite.sh panama 2>&1 | tee benchmark-results/current/panama-${{ matrix.platform }}.log
            cp benchmark-results/*.json benchmark-results/current/ 2>/dev/null || true
          else
            ./run-performance-suite.sh jni 2>&1 | tee benchmark-results/current/jni-${{ matrix.platform }}.log
            cp benchmark-results/*.json benchmark-results/current/ 2>/dev/null || true
          fi

      - name: Upload current results
        uses: actions/upload-artifact@v4
        with:
          name: current-${{ matrix.platform }}-java${{ matrix.java-version }}
          path: wasmtime4j-benchmarks/benchmark-results/current/
          retention-days: 30

  # Analyze performance regression
  regression-analysis:
    name: Performance Regression Analysis
    needs: [generate-baseline, current-performance]
    if: always() && (needs.generate-baseline.result == 'success' || needs.generate-baseline.result == 'skipped') && needs.current-performance.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python for analysis
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install analysis dependencies
        run: |
          pip install numpy pandas matplotlib seaborn scipy jinja2

      - name: Download all benchmark results
        uses: actions/download-artifact@v4
        with:
          pattern: '*-*-java*'
          merge-multiple: true

      - name: Create performance analysis script
        run: |
          cat > analyze_performance.py << 'EOF'
          import json
          import os
          import pandas as pd
          import numpy as np
          from pathlib import Path
          import sys

          def load_benchmark_data(directory):
              """Load all JSON benchmark files from a directory."""
              data = []
              json_files = list(Path(directory).rglob('*.json'))
              
              for file_path in json_files:
                  try:
                      with open(file_path, 'r') as f:
                          benchmark_data = json.load(f)
                          if isinstance(benchmark_data, list):
                              for item in benchmark_data:
                                  if 'benchmark' in item and 'primaryMetric' in item:
                                      data.append({
                                          'benchmark': item['benchmark'],
                                          'score': item['primaryMetric']['score'],
                                          'unit': item['primaryMetric']['scoreUnit'],
                                          'file': str(file_path)
                                      })
                  except Exception as e:
                      print(f"Error loading {file_path}: {e}")
              
              return pd.DataFrame(data) if data else pd.DataFrame()

          def analyze_regression(baseline_df, current_df, threshold=0.05):
              """Analyze performance regression between baseline and current."""
              if baseline_df.empty or current_df.empty:
                  return pd.DataFrame(), []

              # Merge on benchmark name
              merged = pd.merge(baseline_df, current_df, on='benchmark', suffixes=('_baseline', '_current'))
              
              if merged.empty:
                  return pd.DataFrame(), []

              # Calculate regression
              merged['regression_pct'] = ((merged['score_current'] - merged['score_baseline']) / merged['score_baseline'] * 100)
              merged['is_regression'] = merged['regression_pct'] > (threshold * 100)
              
              # Find significant regressions
              regressions = merged[merged['is_regression']].copy()
              
              return merged, regressions.to_dict('records')

          def main():
              baseline_dir = Path('baseline')
              current_dir = Path('current')
              
              if not baseline_dir.exists():
                  print("No baseline directory found, skipping regression analysis")
                  return
                  
              if not current_dir.exists():
                  print("No current directory found, skipping regression analysis")
                  return

              baseline_df = load_benchmark_data(baseline_dir)
              current_df = load_benchmark_data(current_dir)
              
              print(f"Loaded {len(baseline_df)} baseline benchmarks")
              print(f"Loaded {len(current_df)} current benchmarks")
              
              merged_df, regressions = analyze_regression(baseline_df, current_df)
              
              if not merged_df.empty:
                  print(f"\nPerformance Analysis:")
                  print(f"Total benchmarks compared: {len(merged_df)}")
                  print(f"Performance regressions found: {len(regressions)}")
                  
                  # Save detailed analysis
                  merged_df.to_csv('performance_analysis.csv', index=False)
                  
                  if regressions:
                      print("\nSignificant Regressions (>5%):")
                      for reg in regressions:
                          print(f"  - {reg['benchmark']}: {reg['regression_pct']:.1f}% slower")
                      
                      # Save regression report
                      with open('regression_report.json', 'w') as f:
                          json.dump(regressions, f, indent=2)
                      
                      sys.exit(1)  # Exit with error if regressions found
                  else:
                      print("No significant performance regressions detected!")
              else:
                  print("No matching benchmarks found for comparison")

          if __name__ == '__main__':
              main()
          EOF

      - name: Run regression analysis
        id: regression
        continue-on-error: true
        run: python analyze_performance.py

      - name: Create performance report
        run: |
          echo "# Performance Analysis Report" > performance_report.md
          echo "" >> performance_report.md
          echo "**Date:** $(date -u)" >> performance_report.md
          echo "**Commit:** ${{ github.sha }}" >> performance_report.md
          echo "**Branch:** ${{ github.ref_name }}" >> performance_report.md
          echo "" >> performance_report.md
          
          if [ -f "regression_report.json" ]; then
            echo "## ⚠️ Performance Regressions Detected" >> performance_report.md
            echo "" >> performance_report.md
            python -c "
          import json
          with open('regression_report.json', 'r') as f:
              regressions = json.load(f)
          for reg in regressions:
              print(f\"- **{reg['benchmark']}**: {reg['regression_pct']:.1f}% slower\")
          " >> performance_report.md
          else
            echo "## ✅ No Performance Regressions" >> performance_report.md
            echo "All benchmarks performed within acceptable limits." >> performance_report.md
          fi
          
          echo "" >> performance_report.md
          echo "## Detailed Analysis" >> performance_report.md
          if [ -f "performance_analysis.csv" ]; then
            echo "Detailed performance data saved to artifacts." >> performance_report.md
          fi

      - name: Upload analysis results
        uses: actions/upload-artifact@v4
        with:
          name: performance-analysis
          path: |
            performance_analysis.csv
            regression_report.json
            performance_report.md
          retention-days: 90

      - name: Create issue if regressions found
        if: steps.regression.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let reportContent = "Performance regression detected in automated testing.";
            if (fs.existsSync('performance_report.md')) {
              reportContent = fs.readFileSync('performance_report.md', 'utf8');
            }
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Performance Regression Detected - ${new Date().toISOString().split('T')[0]}`,
              body: reportContent,
              labels: ['performance', 'regression', 'bug']
            });

      - name: Comment on PR if this is a PR
        if: github.event_name == 'pull_request' && steps.regression.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let reportContent = "Performance regression detected.";
            if (fs.existsSync('performance_report.md')) {
              reportContent = fs.readFileSync('performance_report.md', 'utf8');
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: reportContent
            });