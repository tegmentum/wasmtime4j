name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Build native libraries on each platform's native runner
  build-native:
    name: Native (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
            lib: libwasmtime4j.so
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            target: aarch64-unknown-linux-gnu
            lib: libwasmtime4j.so
          - os: macos-latest
            platform: darwin-aarch64
            target: aarch64-apple-darwin
            lib: libwasmtime4j.dylib
          - os: windows-latest
            platform: windows-x86_64
            target: x86_64-pc-windows-msvc
            lib: wasmtime4j.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wasmtime4j-native/.cargo-target
          key: cargo-${{ matrix.platform }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: cargo-${{ matrix.platform }}-

      - name: Build native library
        shell: bash
        env:
          CARGO_TARGET_DIR: wasmtime4j-native/.cargo-target
        run: cargo build --release --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: wasmtime4j-native/.cargo-target/${{ matrix.target }}/release/${{ matrix.lib }}
          retention-days: 7
          if-no-files-found: error

  # Static analysis (no native libs needed, runs in parallel with build-native)
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-quality-${{ hashFiles('**/pom.xml') }}
          restore-keys: m2-quality-

      - name: Checkstyle
        run: ./mvnw checkstyle:check -B -P skip-native -pl wasmtime4j,wasmtime4j-jni,wasmtime4j-native-loader

      - name: Spotless
        run: ./mvnw spotless:check -B -P skip-native -pl wasmtime4j,wasmtime4j-jni,wasmtime4j-panama,wasmtime4j-native-loader

      - name: SpotBugs
        run: ./mvnw compile spotbugs:check -B -P skip-native -pl wasmtime4j,wasmtime4j-native-loader

      - name: PMD
        run: ./mvnw compile pmd:check -B -P skip-native -pl wasmtime4j,wasmtime4j-native-loader

  # Test matrix — downloads pre-built native libs
  test:
    name: Test Java ${{ matrix.java }} (${{ matrix.platform }})
    needs: build-native
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            platform: linux-x86_64
            java: '8'
          - os: ubuntu-latest
            platform: linux-x86_64
            java: '21'
          - os: ubuntu-latest
            platform: linux-x86_64
            java: '23'
          # Linux ARM64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            java: '8'
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            java: '21'
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            java: '23'
          # macOS ARM64
          - os: macos-latest
            platform: darwin-aarch64
            java: '8'
          - os: macos-latest
            platform: darwin-aarch64
            java: '21'
          - os: macos-latest
            platform: darwin-aarch64
            java: '23'
          # Windows x86_64
          - os: windows-latest
            platform: windows-x86_64
            java: '8'
          - os: windows-latest
            platform: windows-x86_64
            java: '21'
          - os: windows-latest
            platform: windows-x86_64
            java: '23'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: ${{ matrix.java == '8' && 'zulu' || 'temurin' }}

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-test-${{ matrix.java }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: m2-test-

      - name: Download native library
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: wasmtime4j-native/src/main/resources/natives/${{ matrix.platform }}/

      - name: Verify native library
        shell: bash
        run: ls -la wasmtime4j-native/src/main/resources/natives/${{ matrix.platform }}/

      - name: Install and test
        shell: bash
        run: |
          COMMON_ARGS="-B -P skip-native -q -DskipQuality -Dmaven.javadoc.skip=true -Dgpg.skip=true -Dcheckstyle.skip=true -Dspotless.check.skip=true"

          if [ "${{ matrix.java }}" = "8" ]; then
            # Java 8: install core modules, run only wasmtime4j unit tests
            ./mvnw install $COMMON_ARGS -DskipTests -pl wasmtime4j,wasmtime4j-native,wasmtime4j-jni,wasmtime4j-native-loader
            ./mvnw test $COMMON_ARGS -pl wasmtime4j
          elif [ "${{ matrix.java }}" = "21" ]; then
            # Java 21: install all except Java 22+ modules, run wasmtime test suite
            ./mvnw install $COMMON_ARGS -DskipTests -pl '!:wasmtime4j-tests-integration,!:wasmtime4j-tests-smoke,!:wasmtime4j-tests-stress'
            ./mvnw test $COMMON_ARGS -pl wasmtime4j-tests/wasmtime
          else
            # Java 23: full install, run wasmtime + benchmark tests
            ./mvnw install $COMMON_ARGS -DskipTests
            ./mvnw test $COMMON_ARGS --fail-at-end -pl wasmtime4j-tests/wasmtime,wasmtime4j-benchmarks
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.platform }}-java${{ matrix.java }}
          path: '**/target/surefire-reports/'
          retention-days: 7
