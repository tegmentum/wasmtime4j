version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
    open-pull-requests-limit: 10
    # JUnit 6 requires Java 17+ and a coordinated toolchain bump
    # (surefire 3.5+, drop Java 8 from the CI matrix, unify
    # junit.platform.version into junit.version). Block major bumps
    # until we're ready to do that as a scoped piece of work.
    ignore:
      - dependency-name: "org.junit.jupiter:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.junit.platform:*"
        update-types: ["version-update:semver-major"]
    groups:
      maven-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
    open-pull-requests-limit: 10
    # Wasmtime crates are pinned to wasmtime-version.properties and bumped
    # via scripts/sync-wasmtime-version.sh; the wasmtime-upstream-watch
    # workflow opens a tracking issue when upstream releases. Keep Dependabot
    # away from them so it doesn't fight the version-sync flow.
    # jni 0.22 is a type-system redesign (JNIEnv split into
    # EnvUnowned/EnvOwned, GlobalRef<T> and JavaStr<StringRef>
    # generics, JValueGen -> JValue, jboolean semantics). Migrating
    # requires ~1000+ edits across native/src and revalidation of the
    # WAST suite — scoped work, not a Dependabot merge. Block minor
    # and major bumps until we adopt it deliberately.
    ignore:
      - dependency-name: "wasmtime"
      - dependency-name: "wasmtime-*"
      - dependency-name: "jni"
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: /wasmtime4j-native/fuzz
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "wasmtime"
      - dependency-name: "wasmtime-*"
      - dependency-name: "jni"
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
    groups:
      cargo-fuzz-minor-patch:
        update-types:
          - minor
          - patch
