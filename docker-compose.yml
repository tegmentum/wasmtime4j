version: '3.8'

services:
  # Production Wasmtime4j service
  wasmtime4j:
    build:
      context: .
      target: runtime
    image: wasmtime4j:latest
    container_name: wasmtime4j-prod
    restart: unless-stopped
    environment:
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
      - WASMTIME4J_LOG_LEVEL=INFO
      - WASMTIME4J_CACHE_SIZE=512MB
    volumes:
      - ./wasm-modules:/opt/wasmtime4j/wasm:ro
      - wasmtime4j-logs:/opt/wasmtime4j/logs
      - wasmtime4j-cache:/opt/wasmtime4j/cache
    networks:
      - wasmtime4j-network
    healthcheck:
      test: ["CMD", "java", "-cp", "/opt/wasmtime4j/*", "ai.tegmentum.wasmtime4j.util.HealthCheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Development service with debugging
  wasmtime4j-dev:
    build:
      context: .
      target: development
    image: wasmtime4j:dev
    container_name: wasmtime4j-dev
    environment:
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      - WASMTIME4J_LOG_LEVEL=DEBUG
    volumes:
      - ./wasm-modules:/opt/wasmtime4j/wasm
      - ./logs:/opt/wasmtime4j/logs
      - ./target:/opt/wasmtime4j/latest:ro
    ports:
      - "5005:5005"  # Debug port
      - "8080:8080"  # Application port
    networks:
      - wasmtime4j-network
    profiles:
      - development

  # Benchmark service for performance testing
  wasmtime4j-benchmark:
    build:
      context: .
      target: benchmark
    image: wasmtime4j:benchmark
    container_name: wasmtime4j-benchmark
    environment:
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=90.0
    volumes:
      - ./benchmark-results:/opt/wasmtime4j/results
      - ./wasm-modules:/opt/wasmtime4j/wasm:ro
    networks:
      - wasmtime4j-network
    profiles:
      - benchmark
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G

  # Monitoring stack
  prometheus:
    image: prom/prometheus:latest
    container_name: wasmtime4j-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - wasmtime4j-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: wasmtime4j-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=wasmtime4j
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - wasmtime4j-network
    profiles:
      - monitoring

  # Log aggregation
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: wasmtime4j-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - wasmtime4j-network
    profiles:
      - logging

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: wasmtime4j-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - wasmtime4j-network
    profiles:
      - logging

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: wasmtime4j-logstash
    volumes:
      - ./monitoring/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - wasmtime4j-logs:/var/log/wasmtime4j:ro
    depends_on:
      - elasticsearch
    networks:
      - wasmtime4j-network
    profiles:
      - logging

  # Load balancer for high availability
  nginx:
    image: nginx:alpine
    container_name: wasmtime4j-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - wasmtime4j
    networks:
      - wasmtime4j-network
    profiles:
      - production

volumes:
  wasmtime4j-logs:
    driver: local
  wasmtime4j-cache:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  elasticsearch-data:
    driver: local

networks:
  wasmtime4j-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16