input {
  # File input for Wasmtime4j logs
  file {
    path => "/var/log/wasmtime4j/*.log"
    start_position => "beginning"
    codec => "json"
    tags => ["wasmtime4j", "application"]
    type => "wasmtime4j-app"
  }

  # File input for JVM logs
  file {
    path => "/var/log/wasmtime4j/gc*.log"
    start_position => "beginning"
    tags => ["wasmtime4j", "jvm", "gc"]
    type => "wasmtime4j-jvm"
  }

  # Beats input for container logs
  beats {
    port => 5044
    tags => ["beats"]
  }

  # Syslog input for system logs
  syslog {
    port => 5514
    tags => ["syslog"]
  }

  # TCP input for direct application logging
  tcp {
    port => 5000
    codec => "json"
    tags => ["tcp", "application"]
  }
}

filter {
  # Common timestamp handling
  if [type] == "wasmtime4j-app" {
    date {
      match => [ "timestamp", "ISO8601" ]
    }

    # Parse structured log fields
    if [message] =~ /^\{/ {
      json {
        source => "message"
      }
    }

    # Extract WebAssembly specific information
    if [module_name] {
      mutate {
        add_field => { "wasm_module" => "%{module_name}" }
      }
    }

    if [instance_id] {
      mutate {
        add_field => { "wasm_instance" => "%{instance_id}" }
      }
    }

    # Categorize log levels
    if [level] == "ERROR" {
      mutate {
        add_tag => ["error"]
        add_field => { "severity" => "high" }
      }
    } else if [level] == "WARN" {
      mutate {
        add_tag => ["warning"]
        add_field => { "severity" => "medium" }
      }
    } else if [level] == "INFO" {
      mutate {
        add_tag => ["info"]
        add_field => { "severity" => "low" }
      }
    }

    # Extract performance metrics from logs
    if [execution_time_ms] {
      mutate {
        convert => { "execution_time_ms" => "integer" }
      }
    }

    if [memory_usage_bytes] {
      mutate {
        convert => { "memory_usage_bytes" => "integer" }
      }
    }

    # Parse stack traces
    if [stack_trace] {
      mutate {
        add_tag => ["exception"]
      }
    }
  }

  # JVM GC log parsing
  if [type] == "wasmtime4j-jvm" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:gc_timestamp}: %{DATA:gc_info}"
      }
    }

    date {
      match => [ "gc_timestamp", "yyyy-MM-dd'T'HH:mm:ss.SSSZ" ]
    }

    if [gc_info] =~ /GC/ {
      mutate {
        add_tag => ["gc"]
      }
    }
  }

  # Container logs from Beats
  if "beats" in [tags] {
    if [container] {
      if [container][name] =~ /wasmtime4j/ {
        mutate {
          add_tag => ["container", "wasmtime4j"]
        }
      }
    }

    # Parse Kubernetes metadata
    if [kubernetes] {
      mutate {
        add_field => { "k8s_namespace" => "%{[kubernetes][namespace]}" }
        add_field => { "k8s_pod" => "%{[kubernetes][pod][name]}" }
        add_field => { "k8s_container" => "%{[kubernetes][container][name]}" }
      }
    }
  }

  # Security event detection
  if [logger] == "SECURITY" or "security" in [tags] {
    mutate {
      add_tag => ["security_event"]
      add_field => { "alert_priority" => "high" }
    }
  }

  # Performance event detection
  if [logger] == "PERFORMANCE" or [execution_time_ms] {
    mutate {
      add_tag => ["performance"]
    }

    # Flag slow operations
    if [execution_time_ms] and [execution_time_ms] > 1000 {
      mutate {
        add_tag => ["slow_operation"]
        add_field => { "performance_alert" => "slow_execution" }
      }
    }
  }

  # Error pattern detection
  if [message] =~ /(?i)(exception|error|failed|timeout|refused)/ {
    mutate {
      add_tag => ["error_pattern"]
    }
  }

  # Memory leak detection patterns
  if [message] =~ /(?i)(out of memory|memory leak|heap space)/ {
    mutate {
      add_tag => ["memory_issue"]
      add_field => { "alert_priority" => "critical" }
    }
  }

  # Add common metadata
  mutate {
    add_field => { "service" => "wasmtime4j" }
    add_field => { "environment" => "${ENVIRONMENT:production}" }
    add_field => { "version" => "${APP_VERSION:unknown}" }
    add_field => { "processed_at" => "%{@timestamp}" }
  }

  # Cleanup unwanted fields
  mutate {
    remove_field => [ "host", "path", "@version" ]
  }
}

output {
  # Main Elasticsearch output
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST:elasticsearch:9200}"]
    index => "wasmtime4j-logs-%{+YYYY.MM.dd}"
    template_name => "wasmtime4j"
    template => "/usr/share/logstash/templates/wasmtime4j-template.json"
    template_overwrite => true
  }

  # Separate index for errors
  if "error" in [tags] or "exception" in [tags] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOST:elasticsearch:9200}"]
      index => "wasmtime4j-errors-%{+YYYY.MM.dd}"
    }
  }

  # Separate index for security events
  if "security_event" in [tags] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOST:elasticsearch:9200}"]
      index => "wasmtime4j-security-%{+YYYY.MM.dd}"
    }
  }

  # Performance metrics to dedicated index
  if "performance" in [tags] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOST:elasticsearch:9200}"]
      index => "wasmtime4j-performance-%{+YYYY.MM.dd}"
    }
  }

  # Alert on critical events
  if "critical" in [tags] or [alert_priority] == "critical" {
    http {
      url => "${ALERT_WEBHOOK_URL}"
      http_method => "post"
      format => "json"
      mapping => {
        "service" => "wasmtime4j"
        "severity" => "%{severity}"
        "message" => "%{message}"
        "timestamp" => "%{@timestamp}"
        "tags" => "%{tags}"
      }
    }
  }

  # Debug output (remove in production)
  if "${LOG_DEBUG:false}" == "true" {
    stdout {
      codec => rubydebug
    }
  }
}