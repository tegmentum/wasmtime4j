# Test logging configuration for Wasmtime4j smoke tests
# Uses Java Util Logging (JUL) to minimize dependencies

# Root logger level - INFO for smoke test visibility
.level = INFO

# Console handler configuration
handlers = java.util.logging.ConsoleHandler

# Console handler level and format
java.util.logging.ConsoleHandler.level = INFO
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter

# Simple formatter pattern - includes timestamp for smoke test diagnostics
java.util.logging.SimpleFormatter.format = %1$tT %4$s: %5$s%n

# Package-specific logging levels
ai.tegmentum.wasmtime4j.level = INFO
ai.tegmentum.wasmtime4j.smoke.level = INFO

# Test framework logging
org.junit.level = WARNING
org.junit.jupiter.level = WARNING
org.junit.platform.level = WARNING

# Disable noisy loggers
sun.level = SEVERE
javax.level = SEVERE
