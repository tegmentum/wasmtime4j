# Test logging configuration for Wasmtime4j tests
# Uses Java Util Logging (JUL) to minimize dependencies
# Optimized for fast test execution with minimal I/O overhead

# Root logger level - WARNING for speed, change to INFO for debugging
.level = WARNING

# Console handler configuration
handlers = java.util.logging.ConsoleHandler

# Console handler level and format
java.util.logging.ConsoleHandler.level = WARNING
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter

# Simple formatter pattern - compact for speed
java.util.logging.SimpleFormatter.format = %4$s: %5$s%n

# Package-specific logging levels
# Use WARNING for faster test execution (INFO/FINE generates significant I/O overhead)
ai.tegmentum.wasmtime4j.level = WARNING
ai.tegmentum.wasmtime4j.utils.level = WARNING
ai.tegmentum.wasmtime4j.integration.level = WARNING
ai.tegmentum.wasmtime4j.webassembly.level = WARNING
ai.tegmentum.wasmtime4j.native.level = WARNING
ai.tegmentum.wasmtime4j.jni.level = WARNING

# Test framework logging
org.junit.level = WARNING
org.junit.jupiter.level = WARNING
org.junit.platform.level = WARNING

# Disable noisy loggers
org.mockito.level = SEVERE
sun.level = SEVERE
javax.level = SEVERE