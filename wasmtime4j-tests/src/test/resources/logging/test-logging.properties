# Test logging configuration for Wasmtime4j tests
# Uses Java Util Logging (JUL) to minimize dependencies

# Root logger level
.level = INFO

# Console handler configuration
handlers = java.util.logging.ConsoleHandler

# Console handler level and format
java.util.logging.ConsoleHandler.level = ALL
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter

# Simple formatter pattern
java.util.logging.SimpleFormatter.format = [%1$tF %1$tT] %4$s %2$s - %5$s %6$s%n

# Package-specific logging levels
ai.tegmentum.wasmtime4j.level = FINE
ai.tegmentum.wasmtime4j.utils.level = INFO
ai.tegmentum.wasmtime4j.integration.level = INFO
ai.tegmentum.wasmtime4j.webassembly.level = INFO
ai.tegmentum.wasmtime4j.native.level = INFO

# Test framework logging
org.junit.level = WARNING
org.junit.jupiter.level = WARNING
org.junit.platform.level = WARNING

# Disable some noisy loggers
org.mockito.level = WARNING
sun.level = WARNING
javax.level = WARNING