# Wasmtime4j Test Configuration Properties

# Test execution settings
wasmtime4j.test.timeout=300
wasmtime4j.test.memory=2g
wasmtime4j.test.parallel=true

# Test categories (set to true to enable)
wasmtime4j.test.runtime.enabled=false
wasmtime4j.test.platform.enabled=false
wasmtime4j.test.wasm.suite.enabled=false
wasmtime4j.test.native.enabled=false
wasmtime4j.test.performance.enabled=false
wasmtime4j.test.wasi.enabled=false
wasmtime4j.test.memory.enabled=false
wasmtime4j.test.security.enabled=false
wasmtime4j.test.error.enabled=false
wasmtime4j.test.concurrency.enabled=false

# WebAssembly test file locations
wasmtime4j.test.wasm.dir=src/test/resources/wasm
wasmtime4j.test.wasm.official.suite.url=https://github.com/WebAssembly/spec/archive/refs/heads/main.zip
wasmtime4j.test.wasmtime.suite.url=https://github.com/bytecodealliance/wasmtime/archive/refs/heads/main.zip

# Native library settings
wasmtime4j.test.native.library.name=wasmtime4j
wasmtime4j.test.native.library.version=36.0.2

# Performance test settings
wasmtime4j.test.performance.warmup.iterations=5
wasmtime4j.test.performance.measurement.iterations=10
wasmtime4j.test.performance.timeout.seconds=60

# Platform-specific settings
wasmtime4j.test.platform.skip.unsupported=true
wasmtime4j.test.platform.require.all.architectures=false

# Memory test settings
wasmtime4j.test.memory.max.heap=1g
wasmtime4j.test.memory.max.direct=512m
wasmtime4j.test.memory.gc.enabled=true

# Logging settings (override with system properties)
wasmtime4j.test.logging.level=INFO
wasmtime4j.test.logging.file.enabled=false
wasmtime4j.test.logging.file.path=target/test-logs/wasmtime4j-tests.log