# Production configuration for wasmtime4j
# This configuration optimizes for production deployments with focus on security, performance, and reliability

# Environment Settings
wasmtime.environment=production

# Engine Configuration
wasmtime.engine.optimizationLevel=SPEED_AND_SIZE
wasmtime.engine.parallelCompilation=true
wasmtime.engine.craneliftOptLevel=2
wasmtime.engine.enableProfiling=false
wasmtime.engine.compilationTimeout=300000
wasmtime.engine.maxMemorySize=1073741824
wasmtime.engine.enableDebugInfo=false
wasmtime.engine.enableConsumeFuel=true
wasmtime.engine.fuelConsumption=1000000

# Pool Configuration
wasmtime.pool.maxEngines=20
wasmtime.pool.minEngines=5
wasmtime.pool.maxIdleTime=600000
wasmtime.pool.acquireTimeout=30000
wasmtime.pool.enableHealthChecks=true
wasmtime.pool.healthCheckInterval=300000

# Security Configuration
wasmtime.security.enableSandboxing=true
wasmtime.security.securityLevel=MAXIMUM
wasmtime.security.maxExecutionTime=30000
wasmtime.security.enableResourceLimits=true
wasmtime.security.maxMemoryLimit=536870912
wasmtime.security.maxFunctionCalls=10000

# Monitoring Configuration
wasmtime.monitoring.enableMetrics=true
wasmtime.monitoring.enableTracing=false
wasmtime.monitoring.enableHealthChecks=true
wasmtime.monitoring.healthCheckInterval=60000
wasmtime.monitoring.enableAlerting=true
wasmtime.monitoring.alertThresholdErrorRate=5.0
wasmtime.monitoring.alertThresholdResponseTime=5000

# Resource Management Configuration
wasmtime.resources.cleanupInterval=60000
wasmtime.resources.maxResourceAge=3600000
wasmtime.resources.shutdownTimeout=30000
wasmtime.resources.maxResourcesPerGroup=1000
wasmtime.resources.enableLeakDetection=true
wasmtime.resources.enableMemoryPressureHandling=true
wasmtime.resources.memoryPressureThreshold=80.0

# Memory Optimization Configuration
wasmtime.memory.monitoringInterval=10000
wasmtime.memory.highPressureThreshold=85.0
wasmtime.memory.criticalPressureThreshold=95.0
wasmtime.memory.enableProactiveCleanup=true
wasmtime.memory.enableLargeObjectTracking=true
wasmtime.memory.enableAdaptiveOptimization=true
wasmtime.memory.maxLinearMemorySize=536870912
wasmtime.memory.cleanupGracePeriod=5000

# Error Handling Configuration
wasmtime.errorHandling.maxRetries=3
wasmtime.errorHandling.initialDelay=100
wasmtime.errorHandling.maxDelay=30000
wasmtime.errorHandling.backoffMultiplier=2.0
wasmtime.errorHandling.enableJitter=true
wasmtime.errorHandling.enableCircuitBreaker=true
wasmtime.errorHandling.failureThreshold=50.0
wasmtime.errorHandling.minimumCallCount=10
wasmtime.errorHandling.waitDuration=30000
wasmtime.errorHandling.slidingWindowSize=100
wasmtime.errorHandling.permittedCallsInHalfOpenState=5

# Logging Configuration
wasmtime.logging.level=INFO
wasmtime.logging.enableFileLogging=true
wasmtime.logging.logFile=/app/logs/wasmtime4j.log
wasmtime.logging.maxFileSize=10485760
wasmtime.logging.maxFiles=10
wasmtime.logging.enableConsoleLogging=true
wasmtime.logging.enableStructuredLogging=true

# Native Library Configuration
wasmtime.native.libraryPath=/app/native/lib
wasmtime.native.enableExplicitLoading=true
wasmtime.native.loadTimeout=30000

# Performance Tuning
wasmtime.performance.enableOptimizations=true
wasmtime.performance.enableConnectionPooling=true
wasmtime.performance.enableCaching=true
wasmtime.performance.cacheSize=1000
wasmtime.performance.cacheTtl=3600000
wasmtime.performance.enableCompression=false
wasmtime.performance.threadPoolSize=20

# Application Configuration
app.server.port=8080
app.server.address=0.0.0.0
app.server.contextPath=/
app.server.enableSsl=false
app.server.maxConnections=1000
app.server.connectionTimeout=30000

# Health Check Configuration
app.health.enableEndpoint=true
app.health.endpoint=/health
app.health.enableReadinessCheck=true
app.health.readinessEndpoint=/ready
app.health.enableLivenessCheck=true
app.health.livenessEndpoint=/alive

# Metrics Configuration
app.metrics.enableEndpoint=true
app.metrics.endpoint=/metrics
app.metrics.enablePrometheus=true
app.metrics.enableJmx=false
app.metrics.enableSystemMetrics=true
app.metrics.enableJvmMetrics=true

# Security Headers
app.security.enableHeaders=true
app.security.enableCors=false
app.security.enableCsrf=false
app.security.enableXssProtection=true
app.security.enableContentTypeOptions=true
app.security.enableFrameOptions=true
app.security.enableHsts=false

# Production Overrides
# These can be overridden by environment variables using the pattern:
# WASMTIME_<SECTION>_<PROPERTY>=value
# For example: WASMTIME_ENGINE_MAXENGINES=30