# Single source of truth for project versions
# This file is read by both Maven and Cargo build processes
# To upgrade: update this file and run ./scripts/sync-wasmtime-version.sh

# Wasmtime library version (from upstream)
wasmtime.version=41.0.3

# Wasmtime4j project version (our bindings version)
wasmtime4j.version=1.0.0

# Full version is constructed as: ${wasmtime.version}-${wasmtime4j.version}
# Example: 41.0.3-1.0.0

# Fork branch for SIGABRT fix (update when rebasing fork to new version)
wasmtime.fork.branch=fix/global-code-registry-idempotent-v41
