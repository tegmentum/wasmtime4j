version: '3.8'

# Docker Compose configuration for wasmtime4j applications
# This file demonstrates various deployment scenarios

services:
  # Basic wasmtime4j application
  wasmtime-basic:
    build:
      context: ./basic
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - WASMTIME4J_RUNTIME=auto
      - WASMTIME4J_DEBUG=false
      - JAVA_OPTS=-Xmx512m -XX:+UseG1GC
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - wasmtime-network

  # Spring Boot application with wasmtime4j
  wasmtime-spring:
    build:
      context: ./spring-boot
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
      - "8091:8081"  # Management port
    environment:
      - SPRING_PROFILES_ACTIVE=docker,prod
      - WASMTIME4J_RUNTIME=auto
      - WASMTIME4J_DEBUG=false
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info,metrics,prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    depends_on:
      - redis
      - postgres
    networks:
      - wasmtime-network
    volumes:
      - wasmtime-logs:/app/logs

  # Load balancer for multiple instances
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - wasmtime-basic
      - wasmtime-spring
    networks:
      - wasmtime-network
    restart: unless-stopped

  # Redis for caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - wasmtime-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=wasmtime_app
      - POSTGRES_USER=wasmtime
      - POSTGRES_PASSWORD=wasmtime_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - wasmtime-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wasmtime -d wasmtime_app"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - wasmtime-network
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - wasmtime-network
    restart: unless-stopped

# Networks
networks:
  wasmtime-network:
    driver: bridge

# Volumes
volumes:
  wasmtime-logs:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local