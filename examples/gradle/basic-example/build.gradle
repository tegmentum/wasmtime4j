plugins {
    id 'java'
    id 'application'
    id 'jacoco'
    id 'checkstyle'
}

group = 'com.example'
version = '1.0.0-SNAPSHOT'

// Java version configuration
java {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8

    // Enable toolchain for better version management
    toolchain {
        languageVersion = JavaLanguageVersion.of(8)
    }
}

// Configure repositories
repositories {
    mavenCentral()
    mavenLocal() // For local wasmtime4j snapshots

    // If using snapshot repository
    maven {
        url = "https://oss.sonatype.org/content/repositories/snapshots/"
        mavenContent {
            snapshotsOnly()
        }
    }
}

// Dependency versions
ext {
    wasmtime4jVersion = '1.0.0-SNAPSHOT'
    junitVersion = '5.10.4'
    slf4jVersion = '2.0.9'
    logbackVersion = '1.4.11'
}

dependencies {
    // Wasmtime4j dependency
    implementation "ai.tegmentum:wasmtime4j:${wasmtime4jVersion}"

    // Logging (optional but recommended)
    implementation "org.slf4j:slf4j-api:${slf4jVersion}"
    implementation "ch.qos.logback:logback-classic:${logbackVersion}"

    // Testing dependencies
    testImplementation "org.junit.jupiter:junit-jupiter:${junitVersion}"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher"
}

// Main class configuration
application {
    mainClass = 'com.example.BasicExample'

    // Configure JVM arguments for application
    applicationDefaultJvmArgs = [
        '-Dwasmtime4j.runtime=auto',
        '-Dwasmtime4j.debug=false'
    ]
}

// Test configuration
test {
    useJUnitPlatform()

    // Configure JVM arguments for tests
    jvmArgs = [
        '-Dwasmtime4j.runtime=auto',
        '-Dwasmtime4j.debug=false'
    ]

    // Enable parallel test execution
    maxParallelForks = Runtime.runtime.availableProcessors()

    // Test logging
    testLogging {
        events "passed", "skipped", "failed"
        exceptionFormat "full"
        showStandardStreams = false
    }

    // Memory configuration
    minHeapSize = "256m"
    maxHeapSize = "1g"
}

// Code coverage with JaCoCo
jacoco {
    toolVersion = "0.8.8"
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        html.required = true
        csv.required = false
    }
}

// Checkstyle configuration
checkstyle {
    toolVersion = '10.12.4'
    configFile = file('checkstyle.xml')
    ignoreFailures = false
    maxWarnings = 0
}

// Compilation configuration
compileJava {
    options.encoding = 'UTF-8'
    options.compilerArgs += ['-Xlint:unchecked', '-Xlint:deprecation']
}

compileTestJava {
    options.encoding = 'UTF-8'
    options.compilerArgs += ['-Xlint:unchecked', '-Xlint:deprecation']
}

// Task dependencies
check.dependsOn jacocoTestReport

// Custom tasks

// Task to run with JNI runtime
task testJni(type: Test) {
    group = 'verification'
    description = 'Run tests with JNI runtime'

    useJUnitPlatform()
    systemProperty 'wasmtime4j.runtime', 'jni'

    classpath = sourceSets.test.runtimeClasspath
    testClassesDirs = sourceSets.test.output.classesDirs
}

// Task to run with Panama runtime (Java 23+)
task testPanama(type: Test) {
    group = 'verification'
    description = 'Run tests with Panama runtime (Java 23+)'

    useJUnitPlatform()
    systemProperty 'wasmtime4j.runtime', 'panama'

    // Enable preview features for Panama
    jvmArgs += ['--enable-preview']

    classpath = sourceSets.test.runtimeClasspath
    testClassesDirs = sourceSets.test.output.classesDirs

    // Only run if Java 23+
    onlyIf {
        JavaVersion.current().isCompatibleWith(JavaVersion.VERSION_23)
    }
}

// Task to run with debug logging
task testDebug(type: Test) {
    group = 'verification'
    description = 'Run tests with debug logging enabled'

    useJUnitPlatform()
    systemProperties = [
        'wasmtime4j.runtime': 'auto',
        'wasmtime4j.debug': 'true',
        'java.util.logging.level': 'FINE'
    ]

    testLogging {
        showStandardStreams = true
    }

    classpath = sourceSets.test.runtimeClasspath
    testClassesDirs = sourceSets.test.output.classesDirs
}

// Task to run application with debug logging
task runDebug(type: JavaExec) {
    group = 'application'
    description = 'Run application with debug logging'

    classpath = sourceSets.main.runtimeClasspath
    mainClass = application.mainClass

    systemProperties = [
        'wasmtime4j.runtime': 'auto',
        'wasmtime4j.debug': 'true',
        'java.util.logging.level': 'FINE'
    ]
}

// Clean task enhancement
clean {
    delete 'logs'
    delete 'target'
}

// Wrapper task configuration
wrapper {
    gradleVersion = '8.4'
    distributionType = Wrapper.DistributionType.BIN
}